services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    
    environment:
      - CONFIG_PATH=/config/local.yaml
    volumes:
      - ./config:/config
      
    depends_on:
      - db
      - migrate
    restart: on-failure

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: gomicro/goose
    command: sh -c "goose postgres \"$DATABASE_URL\" up"
    env_file:
      - .env
    volumes:
      - ./migrations:/migrations
    depends_on:
      - db

volumes:
  postgres_data: